name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Safely remove 'hf' remote if it already exists from a stuck run
          git remote remove hf || true
          
          # Re-add clean endpoint matching your new destination space
          git remote add hf https://Harshitha1504:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Harshitha1504/LLMSCAN_FINAL1
          
          # Force push to reset sync structure cleanly
          git push --force hf main